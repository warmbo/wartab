# ═══════════════════════════════════════════════════
# WarTab — Docker Compose
# ═══════════════════════════════════════════════════
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
# ═══════════════════════════════════════════════════

version: "3.9"

services:
  wartab:
    build: .
    container_name: wartab
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # Persistent data — survives container rebuilds
      - wartab-config:/app/config.json
      - wartab-notes:/app/notes
      - wartab-uploads:/app/uploads
      # Optional: mount a custom config.json
      # - ./config.json:/app/config.json
    environment:
      - TZ=UTC

volumes:
  wartab-config:
  wartab-notes:
  wartab-uploads:
