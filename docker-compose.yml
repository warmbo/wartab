# ═══════════════════════════════════════════════════
# WarTab — Docker Compose
# ═══════════════════════════════════════════════════
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
#
# Data files appear in ./wartab-data/ for easy editing.
# ═══════════════════════════════════════════════════

services:
  wartab:
    build: .
    container_name: wartab
    restart: unless-stopped
    network_mode: host
    # network_mode: host gives the container access to hostname,
    # mDNS (avahi), and Docker socket for the Docker module.
    # Switch to bridged + ports if you don't need those:
    # ports:
    #   - "8081:8081"
    volumes:
      # Persistent data — survives container rebuilds
      - ./wartab-data/config.json:/app/config.json
      - ./wartab-data/notes:/app/notes
      - ./wartab-data/uploads:/app/uploads
      # Optional: mount a custom config.json
      # - ./config.json:/app/config.json
    environment:
      - TZ=UTC
