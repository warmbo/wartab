<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarTab</title>
  <link rel="stylesheet" href="/static/fonts/inter.css">
  <link rel="stylesheet" href="style.css?v=20260615-5">
  <style>button.card-edit-btn,.card .drag-handle{background:none!important;background-color:transparent!important;border:none!important;opacity:.25!important;transition:opacity .15s;cursor:pointer;color:var(--text-tertiary)}.card:hover button.card-edit-btn,.card:hover .drag-handle,.card button.card-edit-btn:hover,.card .drag-handle:hover{opacity:1!important;color:var(--text-primary)!important}</style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <script src="/static/lucide.min.js"></script>
  <script src="storage.js?v=20260615-1"></script>
  <script src="app.js?v=20260615-4"></script>
</head>
<body>
  <div id="page-loader"><div class="loader-spinner"></div></div>
  <div id="bg-canvas"><div class="bg-effects"></div></div>
  <div id="app">
    <!-- Top Bar -->
    <div id="top-bar">
      <div class="brand" id="brand-text"><span>⚔️</span><span>WarTab</span></div>
      <div id="top-stats"></div>
      <div id="top-actions">
        <button class="btn btn-glass btn-icon" id="btn-add-card" title="Add a new card"><i data-lucide="plus"></i></button>
        <button class="btn btn-glass btn-icon" id="btn-config" title="Configure WarTab"><i data-lucide="settings"></i></button>
      </div>
    </div>
    <div id="card-grid"></div>
    <div id="page-bar">
      <div id="page-tabs"></div>
      <button class="btn btn-glass btn-icon btn-sm" id="btn-add-page" title="Add page"><i data-lucide="plus"></i></button>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <span id="footer-text">WarTab v0.2.0</span>
    <a href="http://10.0.0.253:3000/cody/wartab" target="_blank" rel="noopener" id="footer-repo">source</a>
  </div>

  <div class="config-overlay" id="config-overlay"></div>
  <div class="config-panel" id="config-panel">
    <div class="config-header">
      <h2 id="config-header-title"><i data-lucide="settings"></i> WarTab Config</h2>
      <button class="btn btn-glass" id="config-close">✕</button>
    </div>
    <div class="config-body" id="config-body"></div>
  </div>

  <div class="config-overlay" id="icon-picker-overlay"></div>
  <div class="icon-picker" id="icon-picker">
    <div class="config-header">
      <h2>🖼️ Choose Icon</h2>
      <button class="btn btn-glass" id="icon-picker-close">✕</button>
    </div>
    <div class="icon-picker-body">
      <div class="icon-picker-tabs">
        <button class="ip-tab active" data-tab="icons">Icons</button>
        <button class="ip-tab" data-tab="library">Services</button>
        <button class="ip-tab" data-tab="upload">Upload</button>
      </div>
      <div id="icon-picker-content"></div>
    </div>
  </div>

  <div class="config-overlay" id="bg-picker-overlay"></div>
  <div class="icon-picker" id="bg-picker">
    <div class="config-header">
      <h2>🖼️ Choose Background</h2>
      <button class="btn btn-glass" id="bg-picker-close">✕</button>
    </div>
    <div class="icon-picker-body">
      <div id="bg-picker-content"></div>
    </div>
  </div>

  <div class="config-overlay" id="edit-panel-overlay"></div>
  <div class="config-panel" id="edit-panel">
    <div class="config-header">
      <h2 id="edit-panel-title">✎ Edit Card</h2>
      <button class="btn btn-glass" id="edit-panel-close">✕</button>
    </div>
    <div class="config-body" id="edit-panel-body"></div>
  </div>

  <div class="toast-container" id="toast-container"></div>

</body>
</html>
