<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>WarTab</title>
  <meta name="description" content="Self-hosted dashboard and new tab page">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="static/fonts/inter.css">
  <link rel="stylesheet" href="style.css?v=BUILD">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">

  <!-- Core (defer — execute in order, don't block rendering) -->
  <script src="static/lucide.min.js" defer></script>
  <script src="storage.js?v=BUILD" defer></script>
  <script src="core.js?v=BUILD" defer></script>

  <!-- Core modules (defer — execute after core.js, before app.js) -->
  <script src="form-helpers.js?v=BUILD" defer></script>
  <script src="modals.js?v=BUILD" defer></script>
  <script src="stats.js?v=BUILD" defer></script>
  <script src="theme.js?v=BUILD" defer></script>
  <script src="render.js?v=BUILD" defer></script>
  <script src="pages.js?v=BUILD" defer></script>
  <script src="edit-panel.js?v=BUILD" defer></script>
  <script src="page-editor.js?v=BUILD" defer></script>
  <script src="page-drag.js?v=BUILD" defer></script>
  <script src="section-editor.js?v=BUILD" defer></script>
  <script src="config-panel.js?v=BUILD" defer></script>

  <!-- Application logic (defer — depends on all above) -->
  <script src="app.js?v=BUILD" defer></script>

  <!-- Core module scripts (defer — execute after app.js, in order) -->
  <script src="icon-picker.js?v=BUILD" defer></script>
  <script src="uploads.js?v=BUILD" defer></script>
  <script src="dragdrop.js?v=BUILD" defer></script>

  <!-- Module scripts (defer -- download in parallel, execute after app.js) -->
  <script src="modules/digital-pet.js?v=BUILD" defer></script>
  <script src="modules/api-poller.js?v=BUILD" defer></script>
  <script src="modules/clock.js?v=BUILD" defer></script>
  <script src="modules/iframe.js?v=BUILD" defer></script>
  <script src="modules/image.js?v=BUILD" defer></script>
  <script src="modules/lan-scan.js?v=BUILD" defer></script>
  <script src="modules/links.js?v=BUILD" defer></script>
  <script src="modules/notes.js?v=BUILD" defer></script>
  <script src="modules/quotes.js?v=BUILD" defer></script>
  <script src="modules/resource-monitor.js?v=BUILD" defer></script>
  <script src="modules/ascii-anim.js?v=BUILD" defer></script>
  <script src="modules/search.js?v=BUILD" defer></script>
  <script src="modules/timer.js?v=BUILD" defer></script>
  <script src="modules/weather.js?v=BUILD" defer></script>
  <script src="modules/media.js?v=BUILD" defer></script>
  <script src="modules/proxmox.js?v=BUILD" defer></script>
  <script src="modules/git.js?v=BUILD" defer></script>
</head>
<body>
  <div id="page-loader"><div class="loader-spinner"></div></div>
  <div id="bg-canvas"><div class="bg-effects"></div></div>
  <div id="app">
    <!-- Top Bar -->
    <div id="top-bar">
      <div class="brand" id="brand-text"><span>⚔️</span><span>WarTab</span></div>
      <div id="page-tabs"></div>
      <div id="top-stats"></div>
      <div id="top-actions">
        <button class="btn btn-glass btn-icon" id="btn-add-card" title="Add a new card" aria-label="Add card"><i data-lucide="plus"></i></button>
        <button class="btn btn-glass btn-icon btn-sm" id="btn-manage-pages" title="Manage pages" aria-label="Manage pages"><i data-lucide="list"></i></button>
        <button class="btn btn-glass btn-icon" id="btn-config" title="Configure WarTab" aria-label="Configure"><i data-lucide="settings"></i></button>
      </div>
    </div>
    <div id="card-grid"></div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <span id="footer-text">WarTab</span>
  </div>

  <div class="config-overlay" id="config-overlay"></div>
  <div class="slide-panel config-panel" id="config-panel">
    <div class="slide-panel-header">
      <h2 id="config-header-title"><i data-lucide="settings"></i> WarTab Config</h2>
      <button class="btn btn-glass" id="config-close" aria-label="Close config">✕</button>
    </div>
    <div class="slide-panel-body" id="config-body"></div>
  </div>

  <div class="config-overlay" id="icon-picker-overlay"></div>
  <div class="slide-panel icon-picker" id="icon-picker">
    <div class="slide-panel-header">
      <h2>🖼️ Choose Icon</h2>
      <button class="btn btn-glass" id="icon-picker-close" aria-label="Close icon picker">✕</button>
    </div>
    <div class="slide-panel-body">
      <div class="icon-picker-tabs">
        <button class="ip-tab active" data-tab="icons">Icons</button>
        <button class="ip-tab" data-tab="library">Services</button>
        <button class="ip-tab" data-tab="upload">Upload</button>
      </div>
      <div id="icon-picker-content"></div>
    </div>
  </div>

  <div class="config-overlay" id="bg-picker-overlay"></div>
  <div class="slide-panel icon-picker" id="bg-picker">
    <div class="slide-panel-header">
      <h2>🖼️ Choose Background</h2>
      <button class="btn btn-glass" id="bg-picker-close" aria-label="Close background picker">✕</button>
    </div>
    <div class="slide-panel-body">
      <div id="bg-picker-content"></div>
    </div>
  </div>

  <div class="config-overlay" id="edit-panel-overlay"></div>
  <div class="slide-panel config-panel" id="edit-panel">
    <div class="slide-panel-header">
      <h2 id="edit-panel-title">✎ Edit Card</h2>
      <button class="btn btn-glass" id="edit-panel-close" aria-label="Close edit panel">✕</button>
    </div>
    <div class="slide-panel-body" id="edit-panel-body"></div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</body>
</html>
